<div class="library-layout">
  <app-file-upload
    (importCompleted)="onImportCompleted($event)" />

  <section class="books-panel">
    <div class="panel-header">
      <div>
        <h2>Imported books</h2>
        <p>{{ books().length }} books</p>
      </div>
    </div>

    @if (isLoading()) {
      <p class="loading-message">Loading books...</p>
    } @else {
      <app-books-table [books]="books()" />
    }
  </section>
</div>
